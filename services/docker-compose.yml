version: '3.8'

services:
  security:
    build:
      context: .
      dockerfile: security/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - SERVICE_NAME=security
      - SERVICE_PORT=8001
    volumes:
      - ./shared:/app/shared
      - ./security:/app/security
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  codegen:
